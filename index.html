<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juggle Tracker</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #0f172a;
      color: #f8fafc;
      font-family: Inter, system-ui, sans-serif;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 18px;
      padding: 18px;
      border: 1px solid #334155;
    }

    .branch {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .stars {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .star {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      user-select: none;
      font-size: 18px;
    }

    .star.active {
      background: #f59e0b;
      color: black;
    }

    .legend {
      margin-top: 40px;
      display: grid;
      gap: 8px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <h1>Juggle Tracker</h1>
  <div class="subtitle">
    Prototype of personal juggling progression tracker.
  </div>

  <div class="grid" id="grid"></div>

  <div class="legend">
    <div>★1 — tried</div>
    <div>★2 — 10 catches</div>
    <div>★3 — 30 seconds</div>
    <div>★4 — stable</div>
  </div>

  <script>
    const patterns = [
      { name: '3 Ball Cascade', branch: 'Cascade' },
      { name: 'Reverse Cascade', branch: 'Cascade' },
      { name: 'Half Shower Left', branch: 'Shower' },
      { name: 'Half Shower Right', branch: 'Shower' },
      { name: '3 Ball Shower', branch: 'Shower' },
      { name: 'Columns', branch: 'Columns' },
      { name: 'Box', branch: 'Columns' },
      { name: 'Mills Mess', branch: 'Flow' },
      { name: '4 Ball Fountain', branch: '4 Ball' },
      { name: '5 Ball Cascade', branch: '5 Ball' }
    ];

    const storageKey = 'juggle-tracker-state';
    let state = JSON.parse(localStorage.getItem(storageKey) || '{}');

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function setLevel(name, level) {
      state[name] = state[name] === level ? level - 1 : level;
      save();
      render();
    }

    function render() {
      const grid = document.getElementById('grid');

      grid.innerHTML = patterns.map(pattern => {
        const level = state[pattern.name] || 0;

        return `
          <div class="card">
            <div class="branch">${pattern.branch}</div>
            <div class="title">${pattern.name}</div>

            <div class="stars">
              ${[1,2,3,4].map(i => `
                <div
                  class="star ${level >= i ? 'active' : ''}"
                  onclick="setLevel('${pattern.name}', ${i})"
                >★</div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    render();
  </script>
</body>
</html>
