<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juggle Tracker</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2b;
      --panel2: #182338;
      --line: #28364f;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent2: #38bdf8;
      --good: #22c55e;
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, .16), transparent 34rem),
        radial-gradient(circle at top right, rgba(245, 158, 11, .13), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 6vw, 64px);
      line-height: .92;
      letter-spacing: -.06em;
    }

    .subtitle {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
    }

    .stat {
      background: rgba(18, 26, 43, .82);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 18px 40px rgba(0,0,0,.2);
    }

    .stat strong { display: block; font-size: 26px; }
    .stat span { color: var(--muted); font-size: 12px; }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: rgba(18, 26, 43, .82);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; }

    button {
      border: 1px solid rgba(255,255,255,.08);
      background: var(--panel2);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }

    button.active {
      background: var(--accent);
      border-color: transparent;
      color: #111827;
    }

    button.secondary.active {
      background: var(--accent2);
    }

    input {
      min-width: min(100%, 260px);
      background: var(--panel2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 11px 14px;
      outline: none;
      font: inherit;
      font-size: 14px;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend div {
      background: rgba(18, 26, 43, .58);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, rgba(24,35,56,.96), rgba(16,24,39,.96));
      border: 1px solid rgba(255,255,255,.075);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 230px;
      box-shadow: 0 16px 34px rgba(0,0,0,.18);
    }

    .card.done { border-color: rgba(34,197,94,.45); }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .branch {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .11em;
      margin-bottom: 6px;
    }

    .title {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 750;
      letter-spacing: -.025em;
    }

    .type {
      flex: 0 0 auto;
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, .16);
      color: #bae6fd;
      border: 1px solid rgba(56, 189, 248, .2);
    }

    .description {
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.45;
      min-height: 38px;
      margin-bottom: 10px;
    }

    .deps {
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 10px;
    }

    .deps b { color: #e2e8f0; font-weight: 600; }

    .lane {
      margin-top: 9px;
    }

    .lane-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .stars {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .star {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: rgba(255,255,255,.28);
      user-select: none;
      transition: .12s ease;
    }

    .star:hover { transform: translateY(-1px); }
    .star.active { background: var(--accent); border-color: transparent; color: #111827; }

    .tree {
      display: grid;
      gap: 12px;
    }

    .tree-family {
      background: rgba(18, 26, 43, .82);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius);
      padding: 16px;
    }

    .tree-family h2 { margin: 0 0 10px; font-size: 18px; }

    .nodes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .node {
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #e2e8f0;
      font-size: 13px;
    }

    .node.done { background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.32); }
    .arrow { color: var(--muted); }

    @media (max-width: 760px) {
      header { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

</html>
