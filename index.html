<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Juggle Tracker</title>
<style>
:root{--bg:#070b14;--panel:#101827;--panel2:#162236;--line:rgba(148,163,184,.18);--text:#f8fafc;--muted:#94a3b8;--soft:#cbd5e1;--accent:#f59e0b;--blue:#38bdf8;--green:#22c55e;--radius:22px}*{box-sizing:border-box}html{color-scheme:dark}body{margin:0;background:radial-gradient(circle at 8% -8%,rgba(56,189,248,.20),transparent 28rem),radial-gradient(circle at 100% 0,rgba(245,158,11,.15),transparent 26rem),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.page{max-width:1120px;margin:0 auto;padding:18px 12px 88px}.hero{padding:8px 2px 12px}h1{margin:0 0 8px;font-size:44px;line-height:.9;letter-spacing:-.07em}.subtitle{color:var(--muted);font-size:14px;line-height:1.42;max-width:680px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.stat{background:rgba(16,24,39,.78);border:1px solid var(--line);border-radius:18px;padding:11px}.stat strong{display:block;font-size:23px;line-height:1}.stat span{color:var(--muted);font-size:11px}.topbar{display:grid;gap:10px;margin:10px 0 12px}.search{width:100%;height:46px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--text);padding:0 15px;font:inherit;font-size:15px;outline:none}.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}button{min-height:39px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);color:var(--soft);padding:8px 12px;font:inherit;font-size:13px;white-space:nowrap;cursor:pointer}button.active{background:var(--accent);color:#111827;border-color:transparent}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.modes button.active{background:var(--blue)}.legend{display:grid;grid-template-columns:1fr;gap:7px;margin:10px 0 14px;color:var(--muted);font-size:12px}.legend div{border:1px solid var(--line);background:rgba(16,24,39,.55);border-radius:14px;padding:8px 10px}.branch-section{margin-top:14px}.branch-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 2px 8px}.branch-title{font-size:18px;font-weight:800;letter-spacing:-.02em}.branch-meta{color:var(--muted);font-size:12px}.grid{display:grid;grid-template-columns:1fr;gap:11px}.card{--family:#64748b;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(22,34,54,.98),rgba(10,16,27,.98));border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:0 16px 32px rgba(0,0,0,.19)}.card:before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--family)}.card.done{border-color:rgba(34,197,94,.5)}.card.locked{opacity:.62}.head{display:grid;grid-template-columns:1fr 54px;gap:10px;align-items:start}.branch{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:5px}.name{font-size:20px;line-height:1.08;font-weight:850;letter-spacing:-.035em}.diagram{width:54px;height:44px;border:1px solid rgba(255,255,255,.07);border-radius:14px;background:rgba(255,255,255,.035);display:grid;place-items:center}svg{width:48px;height:36px}.arc{fill:none;stroke:var(--family);stroke-width:3;stroke-linecap:round}.arc2{fill:none;stroke:#dbeafe;stroke-width:2.2;stroke-linecap:round;opacity:.55}.dot{fill:#f8fafc;opacity:.9}.desc{color:var(--soft);font-size:13px;line-height:1.36;margin:8px 0}.deps{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:0 0 10px}.dep-title{font-size:12px;color:var(--muted)}.dep{font-size:11px;color:#e2e8f0;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.055);border-radius:999px;padding:4px 7px}.dep.ok{border-color:rgba(34,197,94,.38);background:rgba(34,197,94,.12)}.lanes{display:grid;gap:8px}.lane{display:grid;grid-template-columns:82px 1fr 32px;gap:8px;align-items:center}.lane-label{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.segments{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.seg{height:30px;border-radius:10px;background:rgba(148,163,184,.13);border:1px solid rgba(255,255,255,.06);padding:0}.seg.active{background:var(--family);border-color:transparent}.level{font-size:12px;color:var(--muted);text-align:right}.empty{border:1px dashed var(--line);border-radius:var(--radius);padding:20px;color:var(--muted);text-align:center}.tree{display:grid;gap:10px}.tree-card{--family:#64748b;border:1px solid var(--line);border-left:4px solid var(--family);border-radius:18px;background:rgba(16,24,39,.72);padding:12px}.tree-row{display:flex;align-items:center;justify-content:space-between;gap:8px}.tree-name{font-weight:750}.tree-status{font-size:11px;color:var(--muted)}.focus-note{color:var(--muted);font-size:13px;line-height:1.4;margin:0 2px 12px}.mini-progress{height:7px;background:rgba(148,163,184,.13);border-radius:999px;overflow:hidden;margin-top:9px}.mini-progress span{display:block;height:100%;background:var(--family);border-radius:999px}.quick{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.quick-score{font-size:13px;color:var(--muted)}@media(min-width:760px){.page{padding:32px 20px 72px}.hero{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:end}h1{font-size:64px}.stats{margin:0}.topbar{grid-template-columns:1fr auto;align-items:center}.search{max-width:380px}.modes{display:flex}.legend{grid-template-columns:repeat(5,1fr)}.grid{grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:13px}.lane{grid-template-columns:96px 1fr 34px}.seg{height:24px}.tree{grid-template-columns:repeat(auto-fit,minmax(310px,1fr))}}
</style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div><h1>Juggle Tracker</h1><div class="subtitle">Карта паттернов без базы данных. Отмечай уровень 1–5, отдельно по сторонам и направлениям там, где это реально отдельный навык.</div></div>
    <div class="stats"><div class="stat"><strong id="done">0</strong><span>готово</span></div><div class="stat"><strong id="started">0</strong><span>начато</span></div><div class="stat"><strong id="total">0</strong><span>всего</span></div></div>
  </section>
  <section class="topbar"><input class="search" id="search" placeholder="Поиск паттерна..."/><div class="modes"><button class="active" data-view="cards">Карта</button><button data-view="focus">Фокус</button><button data-view="tree">Дерево</button></div></section>
  <nav class="chips" id="filters"></nav>
  <section class="legend"><div>1 — пробовал</div><div>2 — 3 повторения</div><div>3 — 10 повторений</div><div>4 — стабильно с фокусом</div><div>5 — автоматизм</div></section>
  <main id="app"></main>
</div>
<script>
const levels=[1,2,3,4,5];
const storageKey='juggle-tracker-v6';
const colors={Cascade:'#f59e0b',Shower:'#38bdf8',Columns:'#a78bfa',Flow:'#f472b6','4 Ball Prep':'#22c55e','4 Ball':'#14b8a6','5 Ball':'#fb7185','Body Throws':'#e2e8f0'};
const patterns=[
{id:'cascade-3',name:'3 Ball Cascade',branch:'Cascade',type:'single',deps:[],diagram:'cascade',description:'Базовый перекрёстный паттерн.'},
{id:'reverse-cascade',name:'Reverse Cascade',branch:'Cascade',type:'single',deps:['cascade-3'],diagram:'reverse',description:'Каскад наоборот: броски снаружи внутрь.'},
{id:'tennis',name:'Tennis',branch:'Cascade',type:'single',deps:['cascade-3'],diagram:'tennis',description:'Один мяч летит дугой поверх каскада.'},
{id:'half-shower',name:'Half Shower',branch:'Shower',type:'directional',lanes:['clockwise','counterclockwise'],deps:['cascade-3'],diagram:'shower',description:'Одна рука бросает выше, другая ниже.'},
{id:'full-shower',name:'Full Shower',branch:'Shower',type:'directional',lanes:['clockwise','counterclockwise'],deps:['half-shower'],diagram:'shower',description:'Все мячи движутся по кругу.'},
{id:'shuffle',name:'Shuffle',branch:'Shower',type:'directional',lanes:['left','right'],deps:['half-shower'],diagram:'shower',description:'Потоковый паттерн с быстрыми переносами.'},
{id:'columns',name:'Columns',branch:'Columns',type:'single',deps:['cascade-3'],diagram:'columns',description:'Три почти вертикальные траектории.'},
{id:'fake-columns',name:'Fake Columns',branch:'Columns',type:'directional',lanes:['left','right'],deps:['columns'],diagram:'columns',description:'Иллюзия колонок с обманным движением.'},
{id:'box',name:'Box',branch:'Columns',type:'directional',lanes:['left','right'],deps:['columns'],diagram:'box',description:'Две вертикали и быстрый горизонтальный перенос.'},
{id:'factory',name:'Factory',branch:'Columns',type:'directional',lanes:['left','right'],deps:['columns'],diagram:'box',description:'Одна рука держит столб, другая вращает два мяча.'},
{id:'windmill',name:'Windmill',branch:'Flow',type:'directional',lanes:['left','right'],deps:['reverse-cascade'],diagram:'flow',description:'Круговые движения рук, подготовка к Mills Mess.'},
{id:'mills-mess',name:'Mills Mess',branch:'Flow',type:'directional',lanes:['left','right'],deps:['windmill'],diagram:'flow',description:'Классический flow-паттерн со скрещиванием рук.'},
{id:'two-one-columns',name:'2 in One Hand Columns',branch:'4 Ball Prep',type:'handed',lanes:['left','right'],deps:['cascade-3'],diagram:'columns',description:'Два мяча в одной руке вертикальными бросками.'},
{id:'two-one-clockwise',name:'2 in One Hand Clockwise',branch:'4 Ball Prep',type:'handed',lanes:['left','right'],deps:['two-one-columns'],diagram:'circle',description:'Два мяча в одной руке с вращением по часовой.'},
{id:'two-one-counterclockwise',name:'2 in One Hand Counterclockwise',branch:'4 Ball Prep',type:'handed',lanes:['left','right'],deps:['two-one-columns'],diagram:'circle',description:'Два мяча в одной руке против часовой.'},
{id:'4-fountain',name:'4 Ball Fountain',branch:'4 Ball',type:'single',deps:['two-one-columns'],diagram:'fountain',description:'Базовая жонглировка четырьмя мячами.'},
{id:'4-sync-fountain',name:'Synchronous Fountain',branch:'4 Ball',type:'directional',lanes:['clockwise','counterclockwise'],deps:['4-fountain'],diagram:'fountain',description:'Обе руки бросают одновременно; направление отдельно.'},
{id:'4-async-fountain',name:'Asynchronous Fountain',branch:'4 Ball',type:'single',deps:['4-fountain'],diagram:'fountain',description:'Руки работают со сдвигом по времени.'},
{id:'5-flash',name:'5 Ball Flash',branch:'5 Ball',type:'single',deps:['cascade-3'],diagram:'cascade',description:'Все 5 мячей выброшены и пойманы по разу.'},
{id:'5-cascade',name:'5 Ball Cascade',branch:'5 Ball',type:'single',deps:['5-flash'],diagram:'cascade',description:'Базовый устойчивый паттерн на 5 мячей.'},
{id:'over-shoulder',name:'Over the Shoulder Throw',branch:'Body Throws',type:'directional',lanes:['left','right'],deps:['cascade-3'],diagram:'body',description:'Бросок через плечо. Optional-ветка.'}
];
let state=JSON.parse(localStorage.getItem(storageKey)||'{}');let branch='All';let view='cards';let q='';
const $=id=>document.getElementById(id);const lanes=p=>p.type==='single'?['progress']:p.lanes;const key=(p,l)=>`${p.id}:${l}`;const lvl=(p,l)=>state[key(p,l)]||0;const avg=p=>lanes(p).reduce((s,l)=>s+lvl(p,l),0)/lanes(p).length;const done=p=>lanes(p).every(l=>lvl(p,l)>=5);const started=p=>lanes(p).some(l=>lvl(p,l)>0);const unlocked=p=>p.deps.every(id=>started(patterns.find(x=>x.id===id)));function setLvl(id,l,n){const p=patterns.find(x=>x.id===id),k=key(p,l);state[k]=state[k]===n?n-1:n;if(state[k]<=0)delete state[k];localStorage.setItem(storageKey,JSON.stringify(state));render()}function depsHtml(p){if(!p.deps.length)return'<span class="dep-title">Стартовый навык</span>';return `<span class="dep-title">После:</span>${p.deps.map(id=>{const d=patterns.find(x=>x.id===id);return `<span class="dep ${d&&started(d)?'ok':''}">${d?d.name:id}</span>`}).join('')}`}
function diagram(t){const common='<circle class="dot" cx="16" cy="30" r="3"/><circle class="dot" cx="28" cy="8" r="3"/><circle class="dot" cx="40" cy="30" r="3"/>';if(t==='columns')return`<svg viewBox="0 0 56 40"><path class="arc" d="M16 34V6"/><path class="arc2" d="M28 34V6"/><path class="arc" d="M40 34V6"/>${common}</svg>`;if(t==='box')return`<svg viewBox="0 0 56 40"><path class="arc" d="M14 34V6"/><path class="arc" d="M42 34V6"/><path class="arc2" d="M16 30C25 36 32 36 40 30"/>${common}</svg>`;if(t==='shower'||t==='circle')return`<svg viewBox="0 0 56 40"><path class="arc" d="M12 30C24 2 39 2 45 30"/><path class="arc2" d="M44 31C34 38 21 38 12 31"/>${common}</svg>`;if(t==='fountain')return`<svg viewBox="0 0 56 40"><path class="arc" d="M18 32C8 10 28 5 24 31"/><path class="arc2" d="M38 32C48 10 28 5 32 31"/>${common}</svg>`;return`<svg viewBox="0 0 56 40"><path class="arc" d="M12 30C20 4 36 4 44 30"/><path class="arc2" d="M44 30C36 10 20 10 12 30"/>${common}</svg>`}
function filtered(){return patterns.filter(p=>(branch==='All'||p.branch===branch)&&(!q||`${p.name} ${p.description}`.toLowerCase().includes(q.toLowerCase())))}function branches(){return ['All',...new Set(patterns.map(p=>p.branch))]}function renderFilters(){$('filters').innerHTML=branches().map(b=>`<button class="${b===branch?'active':''}" onclick="branch='${b}';render()">${b}</button>`).join('')}function renderStats(){$('done').textContent=patterns.filter(done).length;$('started').textContent=patterns.filter(started).length;$('total').textContent=patterns.length}function segs(p,l){return`<div class="segments">${levels.map(n=>`<button class="seg ${lvl(p,l)>=n?'active':''}" onclick="setLvl('${p.id}','${l}',${n})" aria-label="${p.name} ${l} ${n}"></button>`).join('')}</div>`}function card(p){return`<article class="card ${done(p)?'done':''} ${!unlocked(p)?'locked':''}" style="--family:${colors[p.branch]||'#64748b'}"><div class="head"><div><div class="branch">${p.branch}${!unlocked(p)?' · locked':''}</div><div class="name">${p.name}</div></div><div class="diagram">${diagram(p.diagram)}</div></div><div class="desc">${p.description}</div><div class="deps">${depsHtml(p)}</div><div class="lanes">${lanes(p).map(l=>`<div class="lane"><div class="lane-label">${l}</div>${segs(p,l)}<div class="level">${lvl(p,l)}/5</div></div>`).join('')}</div></article>`}function renderCards(){const ps=filtered();const bs=branches().filter(b=>b!=='All'&&(branch==='All'||b===branch));$('app').innerHTML=ps.length?bs.map(b=>{const group=ps.filter(p=>p.branch===b);if(!group.length)return'';const pct=Math.round(group.reduce((s,p)=>s+avg(p),0)/(group.length*5)*100);return`<section class="branch-section"><div class="branch-head"><div class="branch-title" style="color:${colors[b]}">${b}</div><div class="branch-meta">${pct}% · ${group.filter(done).length}/${group.length}</div></div><div class="grid">${group.map(card).join('')}</div></section>`}).join(''):'<div class="empty">Ничего не найдено</div>'}
function renderFocus(){const inProgress=patterns.filter(p=>started(p)&&!done(p)).sort((a,b)=>avg(b)-avg(a));const next=patterns.filter(p=>!started(p)&&unlocked(p)).slice(0,6);const list=[...inProgress,...next];$('app').innerHTML=`<p class="focus-note">Фокус показывает начатые, но не доведённые до автоматизма навыки. Ниже — следующие доступные навыки.</p>${list.length?`<div class="grid">${list.map(card).join('')}</div>`:'<div class="empty">Пока нет фокуса: начни любой паттерн или доведи текущие до 5/5.</div>'}`}
function renderTree(){const bs=branches().filter(b=>b!=='All');$('app').innerHTML=`<div class="tree">${bs.map(b=>`<section class="tree-card" style="--family:${colors[b]}"><div class="tree-row"><div class="tree-name">${b}</div><div class="tree-status">${patterns.filter(p=>p.branch===b&&done(p)).length}/${patterns.filter(p=>p.branch===b).length}</div></div><div class="mini-progress"><span style="width:${Math.round(patterns.filter(p=>p.branch===b).reduce((s,p)=>s+avg(p),0)/(patterns.filter(p=>p.branch===b).length*5)*100)}%"></span></div><div class="nodes" style="margin-top:10px">${patterns.filter(p=>p.branch===b).map(p=>`<span class="node ${started(p)?'done':''}">${p.name}</span>`).join('')}</div></section>`).join('')}</div>`}
function render(){renderFilters();renderStats();if(view==='focus')renderFocus();else if(view==='tree')renderTree();else renderCards();document.querySelectorAll('[data-view]').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===view))}
$('search').addEventListener('input',e=>{q=e.target.value;render()});document.querySelectorAll('[data-view]').forEach(btn=>btn.addEventListener('click',()=>{view=btn.dataset.view;render()}));render();
</script>
</body>
</html>
