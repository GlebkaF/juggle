<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#06070b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Juggle" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>Juggle Tracker</title>
<style>
:root{--bg:#06070b;--ink:#f7f4ea;--muted:#8d93a5;--line:rgba(255,255,255,.10);--panel:rgba(18,22,33,.72);--panel2:rgba(255,255,255,.055);--gold:#ffb11f;--cyan:#38d5ff;--violet:#a78bfa;--pink:#ff79c6;--green:#45e08f;--teal:#2dd4bf;--red:#ff6b8a;--radius:28px}*{box-sizing:border-box}html{color-scheme:dark}body{margin:0;background:radial-gradient(circle at 20% -10%,rgba(255,177,31,.18),transparent 28rem),radial-gradient(circle at 120% 0,rgba(56,213,255,.16),transparent 28rem),linear-gradient(180deg,#080b13 0%,#05070c 70%);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,black,transparent 82%)}button,input{font:inherit}.app{max-width:1160px;margin:0 auto;padding:18px 14px 92px}.hero{display:grid;gap:14px;margin:4px 0 14px}.eyebrow{color:var(--gold);font-size:11px;font-weight:850;letter-spacing:.22em;text-transform:uppercase}.title{margin:0;font-size:48px;letter-spacing:-.075em;line-height:.86}.subtitle{color:#b9becc;font-size:14px;line-height:1.4;max-width:680px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.035));padding:12px}.stat strong{display:block;font-size:24px;line-height:1}.stat span{color:var(--muted);font-size:11px}.top{position:sticky;top:0;z-index:5;margin:0 -14px;padding:10px 14px 12px;background:linear-gradient(180deg,rgba(6,7,11,.96),rgba(6,7,11,.72));backdrop-filter:blur(18px)}.search{width:100%;height:50px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.055);color:var(--ink);padding:0 16px;outline:none;font-size:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-top:10px}.chips::-webkit-scrollbar{display:none}.chip{min-height:38px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.055);color:#cbd2df;padding:8px 13px;white-space:nowrap}.chip.active{background:var(--gold);color:#0b0b0d;border-color:transparent}.scale{display:flex;gap:7px;overflow-x:auto;margin:12px 0 18px;scrollbar-width:none}.scale div{white-space:nowrap;color:#abb2c1;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:999px;padding:7px 10px;font-size:12px}.branch-block{margin:20px 0 0}.branch-head{display:flex;align-items:flex-end;justify-content:space-between;margin:0 2px 10px}.branch-title{font-size:22px;font-weight:900;letter-spacing:-.045em}.branch-score{font-size:12px;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{--family:var(--gold);position:relative;overflow:hidden;border-radius:var(--radius);border:1px solid rgba(255,255,255,.12);background:linear-gradient(145deg,rgba(255,255,255,.105),rgba(255,255,255,.035) 46%,rgba(255,255,255,.07));box-shadow:0 22px 54px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);padding:15px}.card:before{content:"";position:absolute;inset:-60% -20% auto auto;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle, color-mix(in srgb,var(--family) 38%,transparent), transparent 68%);opacity:.8}.card.mastered{border-color:color-mix(in srgb,var(--family) 55%,white 0%)}.card.locked{filter:saturate(.7);opacity:.58}.card-head{position:relative;display:grid;grid-template-columns:1fr 104px;gap:12px;align-items:start}.branch-label{color:color-mix(in srgb,var(--family) 72%,white);font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;margin-bottom:7px}.skill{font-size:22px;font-weight:900;line-height:1.04;letter-spacing:-.045em}.locked-mark{color:var(--muted);font-size:11px;margin-left:6px}.plate{width:104px;height:76px;border-radius:22px;background:linear-gradient(180deg,#fffaf0,#e9e1d1);box-shadow:0 12px 28px rgba(0,0,0,.28),inset 0 1px 0 white;display:grid;place-items:center;border:1px solid rgba(255,255,255,.28)}.plate svg{width:98px;height:66px}.desc{position:relative;color:#d6d9e2;font-size:13px;line-height:1.35;margin:10px 0}.deps{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px}.dep-title{color:var(--muted);font-size:11px;padding:4px 0}.dep{font-size:11px;border-radius:999px;padding:4px 8px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.055);color:#dbe1ea}.dep.ok{border-color:rgba(69,224,143,.38);background:rgba(69,224,143,.13);color:#c7ffdc}.lanes{display:grid;gap:9px}.lane{display:grid;grid-template-columns:82px 1fr 42px;gap:8px;align-items:center}.lane-name{color:#aeb5c5;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.meter{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.seg{height:32px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.065);padding:0}.seg.on{background:linear-gradient(180deg,color-mix(in srgb,var(--family) 92%,white 8%),color-mix(in srgb,var(--family) 70%,black 30%));box-shadow:0 0 18px color-mix(in srgb,var(--family) 34%,transparent);border-color:transparent}.lvl{color:var(--muted);font-size:12px;text-align:right}.bottom-nav{position:fixed;left:10px;right:10px;bottom:12px;z-index:10;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:7px;border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(10,14,23,.72);backdrop-filter:blur(22px);box-shadow:0 20px 60px rgba(0,0,0,.45)}.navbtn{border:0;border-radius:999px;background:transparent;color:#cbd2df;padding:11px 8px}.navbtn.active{background:#f5f0e8;color:#0c0d10}.tree{display:grid;gap:12px}.tree-card{--family:var(--gold);border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.055);padding:14px}.tree-top{display:flex;justify-content:space-between}.bar{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:10px 0}.bar span{display:block;height:100%;background:var(--family)}.nodes{display:flex;gap:7px;flex-wrap:wrap}.node{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:7px 9px;color:#cfd5df}.node.done{background:rgba(69,224,143,.12);border-color:rgba(69,224,143,.32)}.empty,.focus-note{color:var(--muted);border:1px dashed var(--line);border-radius:22px;padding:16px;font-size:14px;line-height:1.4}.today-grid{display:grid;gap:12px}.today-label{color:var(--gold);font-size:12px;font-weight:850;letter-spacing:.14em;text-transform:uppercase;margin:16px 2px 8px}.icon-bg{fill:#f7f1e6}.icon-line{fill:none;stroke:#10131a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.icon-thin{fill:none;stroke:#10131a;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 8;opacity:.5}.icon-soft{fill:none;stroke:#10131a;stroke-width:3;stroke-linecap:round;opacity:.34}.icon-ball{fill:#f7f1e6;stroke:#10131a;stroke-width:4}@media(min-width:760px){.app{padding:34px 22px 50px}.hero{grid-template-columns:1fr 360px;align-items:end}.title{font-size:76px}.summary{margin-bottom:4px}.top{position:static;margin:0;padding:0;background:transparent;backdrop-filter:none;display:grid;grid-template-columns:380px 1fr;gap:14px;align-items:start}.chips{margin-top:0}.scale{display:grid;grid-template-columns:repeat(5,1fr)}.grid{grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:14px}.bottom-nav{position:static;max-width:420px;margin:20px auto 0}.seg{height:25px}.tree{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}}
</style>
</head>
<body>
<div class="app">
  <section class="hero"><div><div class="eyebrow">personal skill deck</div><h1 class="title">Juggle<br>Tracker</h1><div class="subtitle">Карта паттернов без базы данных. Отмечай уровень 1–5, отдельно по сторонам и направлениям там, где это реально отдельный навык.</div></div><div class="summary"><div class="stat"><strong id="done">0</strong><span>готово</span></div><div class="stat"><strong id="started">0</strong><span>начато</span></div><div class="stat"><strong id="total">0</strong><span>всего</span></div></div></section>
  <section class="top"><input class="search" id="search" placeholder="Поиск паттерна..."/><nav class="chips" id="filters"></nav></section>
  <section class="scale"><div>1 · проба</div><div>2 · серия</div><div>3 · контроль</div><div>4 · стабильно</div><div>5 · авто</div></section>
  <main id="app"></main>
</div>
<nav class="bottom-nav"><button class="navbtn active" data-view="cards">Карта</button><button class="navbtn" data-view="today">Сегодня</button><button class="navbtn" data-view="tree">Дерево</button></nav>
<script>
const levels=[1,2,3,4,5],storageKey='juggle-tracker-v10';
const colors={Cascade:'#ffb11f',Shower:'#38d5ff',Columns:'#a78bfa',Flow:'#ff79c6','4 Ball Prep':'#45e08f','4 Ball':'#2dd4bf','5 Ball':'#ff6b8a','Body Throws':'#e5e7eb'};
const patterns=[
{id:'cascade-3',name:'3 Ball Cascade',branch:'Cascade',type:'single',deps:[],diagram:'cascade',description:'Базовый перекрёстный паттерн.'},{id:'reverse-cascade',name:'Reverse Cascade',branch:'Cascade',type:'single',deps:['cascade-3'],diagram:'reverse',description:'Каскад наоборот: броски снаружи внутрь.'},{id:'tennis',name:'Tennis',branch:'Cascade',type:'single',deps:['cascade-3'],diagram:'tennis',description:'Один мяч летит дугой поверх каскада.'},
{id:'half-shower',name:'Half Shower',branch:'Shower',type:'directional',lanes:['clockwise','counterclockwise'],deps:['cascade-3'],diagram:'shower',description:'Одна рука бросает выше, другая ниже.'},{id:'full-shower',name:'Full Shower',branch:'Shower',type:'directional',lanes:['clockwise','counterclockwise'],deps:['half-shower'],diagram:'shower',description:'Все мячи движутся по кругу.'},{id:'shuffle',name:'Shuffle',branch:'Shower',type:'directional',lanes:['left','right'],deps:['half-shower'],diagram:'shower',description:'Потоковый паттерн с быстрыми переносами.'},
{id:'columns',name:'Columns',branch:'Columns',type:'single',deps:['cascade-3'],diagram:'columns',description:'Три почти вертикальные траектории.'},{id:'fake-columns',name:'Fake Columns',branch:'Columns',type:'directional',lanes:['left','right'],deps:['columns'],diagram:'fakecolumns',description:'Иллюзия колонок с обманным движением.'},{id:'box',name:'Box',branch:'Columns',type:'single',deps:['columns'],diagram:'box',description:'Две вертикали и быстрый горизонтальный перенос.'},{id:'factory',name:'Factory',branch:'Columns',type:'directional',lanes:['left','right'],deps:['columns'],diagram:'factory',description:'Одна рука держит столб, другая вращает два мяча.'},
{id:'mills-mess',name:'Mills Mess',branch:'Flow',type:'directional',lanes:['left','right'],deps:['reverse-cascade'],diagram:'mills',description:'Классический flow-паттерн со скрещиванием рук.'},
{id:'two-one-columns',name:'2 in One Hand Columns',branch:'4 Ball Prep',type:'handed',lanes:['left','right'],deps:['cascade-3'],diagram:'columns',description:'Два мяча в одной руке вертикальными бросками.'},{id:'two-one-clockwise',name:'2 in One Hand Clockwise',branch:'4 Ball Prep',type:'handed',lanes:['left','right'],deps:['two-one-columns'],diagram:'circle',description:'Два мяча в одной руке с вращением по часовой.'},{id:'two-one-counterclockwise',name:'2 in One Hand Counterclockwise',branch:'4 Ball Prep',type:'handed',lanes:['left','right'],deps:['two-one-columns'],diagram:'circle',description:'Два мяча в одной руке против часовой.'},
{id:'4-fountain',name:'4 Ball Fountain',branch:'4 Ball',type:'single',deps:['two-one-columns'],diagram:'fountain',description:'Базовая жонглировка четырьмя мячами.'},{id:'4-sync-fountain',name:'Synchronous Fountain',branch:'4 Ball',type:'directional',lanes:['clockwise','counterclockwise'],deps:['4-fountain'],diagram:'fountain',description:'Обе руки бросают одновременно; направление отдельно.'},{id:'4-async-fountain',name:'Asynchronous Fountain',branch:'4 Ball',type:'single',deps:['4-fountain'],diagram:'fountain',description:'Руки работают со сдвигом по времени.'},
{id:'5-flash',name:'5 Ball Flash',branch:'5 Ball',type:'single',deps:['cascade-3'],diagram:'five',description:'Все 5 мячей выброшены и пойманы по разу.'},{id:'5-cascade',name:'5 Ball Cascade',branch:'5 Ball',type:'single',deps:['5-flash'],diagram:'five',description:'Базовый устойчивый паттерн на 5 мячей.'},{id:'over-shoulder',name:'Over the Shoulder Throw',branch:'Body Throws',type:'directional',lanes:['left','right'],deps:['cascade-3'],diagram:'shoulder',description:'Бросок через плечо. Optional-ветка.'}];
let state=JSON.parse(localStorage.getItem(storageKey)||'{}'),branch='All',view='cards',q='';
const $=id=>document.getElementById(id),lanes=p=>p.type==='single'?['progress']:p.lanes,key=(p,l)=>`${p.id}:${l}`,lvl=(p,l)=>state[key(p,l)]||0,avg=p=>lanes(p).reduce((s,l)=>s+lvl(p,l),0)/lanes(p).length,done=p=>lanes(p).every(l=>lvl(p,l)>=5),started=p=>lanes(p).some(l=>lvl(p,l)>0),unlocked=p=>p.deps.every(id=>started(patterns.find(x=>x.id===id)));
function setLvl(id,l,n){const p=patterns.find(x=>x.id===id),k=key(p,l);state[k]=state[k]===n?n-1:n;if(state[k]<=0)delete state[k];localStorage.setItem(storageKey,JSON.stringify(state));render()}
function icon(t){const c='<circle class="icon-ball" cx="48" cy="102" r="11"/><circle class="icon-ball" cx="120" cy="104" r="11"/><circle class="icon-ball" cx="192" cy="102" r="11"/>';let p='<path class="icon-line" d="M48 102C70 32 111 32 120 104"/><path class="icon-line" d="M192 102C170 32 129 32 120 104"/>';if(t==='reverse')p='<path class="icon-line" d="M72 112C28 40 92 22 124 86"/><path class="icon-line" d="M168 112C212 40 148 22 116 86"/>';if(t==='tennis')p+='<path class="icon-thin" d="M44 96C86 14 156 14 196 96"/>';if(t==='shower')p='<path class="icon-line" d="M50 105C82 20 160 20 190 105"/><path class="icon-thin" d="M190 108C150 130 90 130 50 108"/>';if(t==='columns')p='<path class="icon-line" d="M64 122V36"/><path class="icon-line" d="M120 122V36"/><path class="icon-line" d="M176 122V36"/>';if(t==='fakecolumns')p='<path class="icon-line" d="M64 122V42"/><path class="icon-line" d="M176 122V42"/><path class="icon-thin" d="M82 112C112 92 132 92 162 112"/>';if(t==='box')p='<path class="icon-line" d="M62 122V36"/><path class="icon-line" d="M178 122V36"/><path class="icon-line" d="M72 118C96 132 144 132 168 118"/>';if(t==='factory')p='<path class="icon-line" d="M86 122V36"/><path class="icon-line" d="M128 122C190 116 190 48 128 42"/><path class="icon-thin" d="M128 42C94 54 94 106 128 122"/>';if(t==='mills')p='<path class="icon-line" d="M48 108C84 28 136 132 192 52"/><path class="icon-line" d="M192 108C156 28 104 132 48 52"/>';if(t==='circle')p='<path class="icon-line" d="M88 116C54 52 122 18 152 70"/><path class="icon-line" d="M152 70C184 126 110 140 88 116"/>';if(t==='fountain')p='<path class="icon-line" d="M82 122C36 44 116 20 102 114"/><path class="icon-line" d="M158 122C204 44 124 20 138 114"/><circle class="icon-ball" cx="82" cy="122" r="10"/><circle class="icon-ball" cx="102" cy="54" r="10"/><circle class="icon-ball" cx="138" cy="54" r="10"/><circle class="icon-ball" cx="158" cy="122" r="10"/>';if(t==='five')p='<path class="icon-line" d="M40 112C68 18 114 18 120 112"/><path class="icon-line" d="M200 112C172 18 126 18 120 112"/><circle class="icon-ball" cx="40" cy="112" r="9"/><circle class="icon-ball" cx="80" cy="70" r="9"/><circle class="icon-ball" cx="120" cy="116" r="9"/><circle class="icon-ball" cx="160" cy="70" r="9"/><circle class="icon-ball" cx="200" cy="112" r="9"/>';if(t==='shoulder')p='<path class="icon-soft" d="M88 122C92 88 108 70 120 70C132 70 148 88 152 122"/><path class="icon-line" d="M72 104C72 36 156 24 180 86"/><path class="icon-thin" d="M180 86C196 104 196 122 184 134"/>';return`<svg viewBox="0 0 240 160"><rect class="icon-bg" width="240" height="160" rx="24"/>${p}${['fountain','five','shoulder'].includes(t)?'':c}</svg>`}
function depsHtml(p){if(!p.deps.length)return'<span class="dep-title">Стартовый навык</span>';return `<span class="dep-title">После:</span>${p.deps.map(id=>{const d=patterns.find(x=>x.id===id);return`<span class="dep ${d&&started(d)?'ok':''}">${d?d.name:id}</span>`}).join('')}`}
function branches(){return ['All',...new Set(patterns.map(p=>p.branch))]}function filtered(){return patterns.filter(p=>(branch==='All'||p.branch===branch)&&(!q||`${p.name} ${p.description}`.toLowerCase().includes(q.toLowerCase())))}function segs(p,l){return`<div class="meter">${levels.map(n=>`<button class="seg ${lvl(p,l)>=n?'on':''}" onclick="setLvl('${p.id}','${l}',${n})"></button>`).join('')}</div>`}function card(p){return`<article class="card ${done(p)?'mastered':''} ${!unlocked(p)?'locked':''}" style="--family:${colors[p.branch]}"><div class="card-head"><div><div class="branch-label">${p.branch}${!unlocked(p)?'<span class="locked-mark">locked</span>':''}</div><div class="skill">${p.name}</div></div><div class="plate">${icon(p.diagram)}</div></div><div class="desc">${p.description}</div><div class="deps">${depsHtml(p)}</div><div class="lanes">${lanes(p).map(l=>`<div class="lane"><div class="lane-name">${l}</div>${segs(p,l)}<div class="lvl">${lvl(p,l)}/5</div></div>`).join('')}</div></article>`}
function renderFilters(){$('filters').innerHTML=branches().map(b=>`<button class="chip ${b===branch?'active':''}" onclick="branch='${b}';render()">${b}</button>`).join('')}function renderStats(){$('done').textContent=patterns.filter(done).length;$('started').textContent=patterns.filter(started).length;$('total').textContent=patterns.length}function renderCards(){const ps=filtered(),bs=branches().filter(b=>b!=='All'&&(branch==='All'||b===branch));$('app').innerHTML=ps.length?bs.map(b=>{const g=ps.filter(p=>p.branch===b);if(!g.length)return'';const pct=Math.round(g.reduce((s,p)=>s+avg(p),0)/(g.length*5)*100);return`<section class="branch-block"><div class="branch-head"><div class="branch-title" style="color:${colors[b]}">${b}</div><div class="branch-score">${pct}% · ${g.filter(done).length}/${g.length}</div></div><div class="grid">${g.map(card).join('')}</div></section>`}).join(''):'<div class="empty">Ничего не найдено</div>'}
function renderToday(){const inProgress=patterns.filter(p=>started(p)&&!done(p)).sort((a,b)=>avg(b)-avg(a));const weak=patterns.filter(unlocked).flatMap(p=>lanes(p).map(l=>({p,l,v:lvl(p,l)}))).filter(x=>x.v>0&&x.v<4).sort((a,b)=>a.v-b.v)[0];const next=patterns.find(p=>!started(p)&&unlocked(p));const repeat=patterns.filter(done).find(p=>p.id!=='cascade-3')||patterns.find(done);let blocks=[];if(inProgress[0])blocks.push(`<div class="today-label">Основной</div>${card(inProgress[0])}`);if(weak)blocks.push(`<div class="today-label">Слабая сторона · ${weak.l}</div>${card(weak.p)}`);if(repeat)blocks.push(`<div class="today-label">Повторение</div>${card(repeat)}`);if(next)blocks.push(`<div class="today-label">Следующий доступный</div>${card(next)}`);$('app').innerHTML=blocks.length?`<div class="today-grid">${blocks.join('')}</div>`:'<div class="empty">Сегодня нечего подсказать: начни любой доступный паттерн.</div>'}
function renderTree(){const bs=branches().filter(b=>b!=='All');$('app').innerHTML=`<div class="tree">${bs.map(b=>{const g=patterns.filter(p=>p.branch===b),pct=Math.round(g.reduce((s,p)=>s+avg(p),0)/(g.length*5)*100);return`<section class="tree-card" style="--family:${colors[b]}"><div class="tree-top"><b>${b}</b><span>${pct}%</span></div><div class="bar"><span style="width:${pct}%"></span></div><div class="nodes">${g.map(p=>`<span class="node ${started(p)?'done':''}">${p.name}</span>`).join('')}</div></section>`}).join('')}</div>`}
function render(){renderFilters();renderStats();view==='today'?renderToday():view==='tree'?renderTree():renderCards();document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===view))}
$('search').addEventListener('input',e=>{q=e.target.value;render()});document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{view=b.dataset.view;render()}));if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}render();
</script>
</body>
</html>
